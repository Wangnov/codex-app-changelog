# 监控官方 Codex appcast,发现新版就重建 + diff + LLM 归纳出第三方 changelog。
#
# 架构要点:
#   - detect 作业在便宜的 ubuntu runner 上做轻量检测(只读 appcast,纯标准库);
#   - build 作业只有在出现 releases/ 里还没有的新版时才启动 macOS runner —— 因为
#     重建依赖 ditto / codesign / spctl / BinaryDelta,这些是 macOS 专属工具。
#
# 需要在仓库 Secrets 配置:
#   CODEX_AUTH_JSON   —— codex exec 的认证内容(本地是 ~/.codex/auth.json)
#   CODEX_CONFIG_TOML —— (可选)codex 的 ~/.codex/config.toml,锁定模型/provider
name: watch-and-build

on:
  schedule:
    - cron: "0 * * * *"      # 每小时检测一次(官方一天最多几版;detect 在 ubuntu 上很轻,按需可调快/慢)
  workflow_dispatch:           # 手动触发
    inputs:
      force:
        description: "强制重建最新版(即使 releases/ 已存在),用于验证 CI 全流程"
        type: boolean
        default: false

permissions:
  contents: write             # 提交 changelog;改用 PR 流程时配合 pull-requests: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      short: ${{ steps.check.outputs.short }}
      from_tag: ${{ steps.check.outputs.from_tag }}
      to_tag: ${{ steps.check.outputs.to_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 取 mirror 稳定、macOS + Windows 资产齐全的 Codex release。
          # 兼容旧 tag(编码 win+mac 版本)与新 tag(codex-app-<version>)。
          # 同一 macOS build 可能连续发布多个 Windows-only tag;若直接取原始最新两个,
          # 会退化成 macOS 自比,并可能用 Windows-only 内容覆盖同一篇 changelog。
          mapfile -t tags < <(
            gh api 'repos/Wangnov/codex-app-mirror/releases?per_page=100' \
              --jq '.[]
                | select(.draft == false and .prerelease == false)
                | select(any(.assets[]; .name | test("^Codex-darwin-arm64-[0-9.]+[.]zip$")))
                | select(any(.assets[]; .name | test("^OpenAI[.]Codex_.*_x64__.*[.]Msix$")))
                | .tag_name' \
              | sed -nE \
                  -e 's/.*-win-([0-9.]+)-mac(-arm64)?-([0-9.]+)-b([0-9]+).*/\3\t\4\t\1\t&/p' \
                  -e 's/^codex-app-([0-9]+(\.[0-9]+)+)$/\1\t0\t0\t&/p' \
              | sort -t$'\t' -k1,1V -k2,2n -k3,3V \
              | awk -F'\t' '{keep[$1]=$0} END{for (k in keep) print keep[k]}' \
              | sort -t$'\t' -k1,1V -k2,2n -k3,3V | cut -f4
          )
          if [ "${#tags[@]}" -lt 2 ]; then
            echo "mirror 中可用于比较的 release 不足 2 个" >&2
            exit 1
          fi
          selected_index=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            selected_index=$((${#tags[@]}-1))
          else
            for ((i=1; i<${#tags[@]}; i++)); do
              candidate=$(echo "${tags[$i]}" | sed -nE \
                -e 's/^codex-app-([0-9]+(\.[0-9]+)+)$/\1/p' \
                -e 's/.*-mac(-arm64)?-([0-9.]+)-b[0-9]+.*/\2/p' \
                | head -1)
              if [ -n "$candidate" ] && [ ! -f "releases/v${candidate}.md" ]; then
                selected_index="$i"
                break
              fi
            done
          fi
          if [ -z "$selected_index" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "稳定双平台 release 已全部生成 changelog。"
            exit 0
          fi
          from_tag="${tags[$((selected_index-1))]}"
          to_tag="${tags[$selected_index]}"
          short=$(echo "$to_tag" | sed -nE \
            -e 's/^codex-app-([0-9]+(\.[0-9]+)+)$/\1/p' \
            -e 's/.*-mac(-arm64)?-([0-9.]+)-b[0-9]+.*/\2/p' \
            | head -1)
          if [ -z "$short" ]; then
            echo "无法从 mirror tag 解析 Codex 应用版本: $to_tag" >&2
            exit 1
          fi
          echo "to_tag=$to_tag"     >> "$GITHUB_OUTPUT"
          echo "from_tag=$from_tag" >> "$GITHUB_OUTPUT"
          echo "short=$short"       >> "$GITHUB_OUTPUT"
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "将构建当前最早缺口 ${short}($from_tag -> $to_tag)。"

  build:
    needs: detect
    if: needs.detect.outputs.should_build == 'true'
    runs-on: macos-latest
    env:
      # 脚本里有中文/箭头等多字节字符,CI 默认 LANG=C 会把 `$VAR→` 的箭头字节当变量名,
      # 触发 unbound variable。强制 UTF-8 locale。
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: pip install cryptography

      # 安装并认证 Codex CLI。安装方式按官方为准;认证从 Secret 注入。
      - name: Setup Codex CLI
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          CODEX_CONFIG_TOML: ${{ secrets.CODEX_CONFIG_TOML }}
        run: |
          npm install -g @openai/codex          # CI 已验证可用;auth 走下方 secret,模型走 vars.CODEX_MODEL
          mkdir -p ~/.codex
          printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json
          [ -n "$CODEX_CONFIG_TOML" ] && printf '%s' "$CODEX_CONFIG_TOML" > ~/.codex/config.toml || true

      - name: Run cross-platform pipeline
        env:
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          CODEX_REASONING: ${{ vars.CODEX_REASONING }}
          GH_TOKEN: ${{ github.token }}   # cross_pair 用 gh 拿 mirror 的 Windows MSIX
        run: |
          scripts/cross_pair.sh \
            "${{ needs.detect.outputs.from_tag }}" \
            "${{ needs.detect.outputs.to_tag }}" \
            work/cross

      - name: Publish changelog
        run: |
          short="${{ needs.detect.outputs.short }}"
          mkdir -p releases releases/en
          cp work/cross/changelog.md "releases/v${short}.md"
          [ -f work/cross/changelog-en.md ] && cp work/cross/changelog-en.md "releases/en/v${short}.md"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "releases/v${short}.md" "releases/en/v${short}.md"
          if git diff --cached --quiet; then
            echo "releases/v${short}.md 无变化,跳过提交。"
          else
            git commit -m "feat(changelog): add ${short}"
            git push
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          short="${{ needs.detect.outputs.short }}"
          # 已存在则跳过(幂等);正文用中文版 changelog。
          gh release view "v${short}" >/dev/null 2>&1 && { echo "Release v${short} 已存在"; exit 0; }
          gh release create "v${short}" --title "v${short}" --notes-file "releases/v${short}.md"

      - name: Deploy website to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # 需要 secret CLOUDFLARE_API_TOKEN(权限:Workers Scripts Edit + agentsmirror zone)。
          # 未配 token 时跳过,不让整条流水线失败 —— changelog 已提交,网站可手动部署。
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "未配置 CLOUDFLARE_API_TOKEN,跳过网站部署(changelog 已入库)"; exit 0
          fi
          cd website
          npm install
          npm run build
          npm exec -- wrangler deploy
